<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WB DIAG v22</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%23E87820'/><text x='16' y='23' font-family='Arial,sans-serif' font-weight='bold' font-size='16' fill='white' text-anchor='middle'>WB</text></svg>">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0e0e11; --surface: #16161c; --border: #252530;
  --text: #d0d0da; --muted: #585870; --accent: #e8a020;
  --blue: #4a8fe8; --green: #3ecf6a; --magenta: #c060c0;
  --amber: #e87820; --red: #e05050;
  --font-mono: ui-monospace, 'SF Mono', monospace;
}
body { background:var(--bg); color:var(--text); font-family:var(--font-mono); font-size:12px; max-width:500px; margin:0 auto; padding:10px; }
h1   { font-size:13px; color:var(--accent); letter-spacing:2px; margin-bottom:2px; }
.sub { font-size:9px; color:var(--muted); margin-bottom:10px; line-height:1.8; }

/* ── Desktop 3-column layout ── */
@media (min-width:768px) {
  body { max-width:1400px; padding:16px 20px; }
  h1, .sub { display:none; }
  .slot {
    display:grid;
    grid-template-columns: minmax(0,1.5fr) minmax(0,1.2fr) minmax(0,1.7fr);
    column-gap:18px;
    align-items:stretch;
  }
  .slot > .left-col    { grid-column:1; position:relative; }
  .slot > .mid-col     { grid-column:2; min-height:300px; }
  .slot > .table-area  { grid-column:3; min-height:300px; }
}
.photo-wrap { position:relative; width:100%; background:#111115; border:1px solid var(--border); border-radius:6px; overflow:hidden; cursor:crosshair; }
.photo-inner { position:relative; width:100%; min-height:200px; }
.photo-canvas { display:block; width:100%; height:auto; vertical-align:top; }
.photo-canvas.loading { filter:blur(5px); opacity:0.6; transition:filter 200ms, opacity 200ms; }

/* ── UI STATE MACHINE (Вариант 3) ──────────────────────────────────────────
   Единственный источник правды для видимости элементов слота A.
   JS меняет только: document.body.dataset.stateA = 'empty'|'loading'|'loaded'
   Добавление нового элемента: 1) строку в каждый блок ниже, 2) проверку в assertUIState
   ─────────────────────────────────────────────────────────────────────────── */

/* empty: начальное состояние и после сброса */
body[data-state-a="empty"] #creativeCalcA   { display: block; }
body[data-state-a="empty"] #phA             { display: block; }
body[data-state-a="empty"] #canvasA         { filter:none; opacity:1; }
body[data-state-a="empty"] #spotHistA       { display: none !important; }

/* loading: файл обрабатывается */
body[data-state-a="loading"] #creativeCalcA { display: none; }
body[data-state-a="loading"] #phA           { display: none; }
body[data-state-a="loading"] #canvasA       { filter:blur(5px); opacity:0.6;
                                              transition:filter 200ms,opacity 200ms; }
body[data-state-a="loading"] #spotHistA     { display: none !important; }

/* loaded: фото готово, споты доступны */
body[data-state-a="loaded"] #creativeCalcA  { display: none; }
body[data-state-a="loaded"] #phA            { display: none; }
body[data-state-a="loaded"] #canvasA        { filter:none; opacity:1; }
body[data-state-a="loaded"] #spotHistA      { display: block; }

/* spotRowA и autoBtnA: spotRow всегда виден, autoBtn управляется классом .visible (базовый CSS) */

/* photoWrapContainerA всегда виден — управляется initEmptyUI один раз */
.circles-canvas { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
.placeholder { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:10px; color:var(--muted); text-align:center; line-height:2.2; }
.file-btn { display:flex; align-items:center; min-height:30px; width:100%; margin-top:5px; box-sizing:border-box; background:transparent; border:1px solid var(--border); border-radius:5px; color:var(--muted); font-family:var(--font-mono); font-size:10px; padding:6px; cursor:pointer; transition:all 0.2s; }
.file-btn.loading { animation:pulse-btn 800ms ease-in-out infinite; pointer-events:none; border-color:var(--accent); color:var(--accent); }
@keyframes pulse-btn { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
.file-btn:hover { border-color:var(--accent); color:var(--accent); }
.spot-row { display:flex; width:100%; margin-top:5px; gap:4px; align-items:stretch; flex-wrap:nowrap; }
.auto-btn { display:none!important; background:transparent; border:1px solid var(--muted); border-radius:5px; color:var(--muted); font-family:var(--font-mono); font-size:9px; padding:5px 6px; cursor:pointer; white-space:nowrap; flex-shrink:0; min-width:52px; }
.auto-btn.visible { display:inline-flex!important; align-items:center; justify-content:center; }
.auto-btn:active { opacity:0.7; }
.spot-row .spot-btns { display:flex; flex:1; gap:4px; margin-top:0; min-width:0; overflow:hidden; }
.export-btn { display:block; width:100%; margin-top:5px; background:transparent; border:1px solid var(--accent); border-radius:5px; color:var(--accent); font-family:var(--font-mono); font-size:10px; font-weight:bold; padding:7px; cursor:pointer; letter-spacing:1px; }
.export-btn:active { opacity:0.7; }
.export-btn:disabled { opacity:0.28; cursor:default; border-color:var(--muted); color:var(--muted); }
.progress-overlay { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; gap:10px; z-index:10; background:rgba(14,14,17,0.55); }
.spinner-wrap { position:relative; width:144px; height:144px; flex-shrink:0; }
.spinner { position:absolute; inset:0; border:8px solid var(--border); border-top:8px solid var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
.spinner-pct { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--accent); font-size:36px; font-weight:bold; font-family:var(--font-mono); pointer-events:none; }
@keyframes spot-blink { 0%,100%{opacity:1;} 50%{opacity:0.15;} }
@keyframes btn-blink { 0%,100%{opacity:1;background:var(--accent);color:#000;} 50%{opacity:0.5;} }
.spot-btn-main.blink { animation:btn-blink 0.7s ease-in-out infinite; border-color:var(--accent); }
@keyframes spin { to { transform:rotate(360deg); } }
.progress-label { font-size:9px; color:var(--accent); letter-spacing:1px; }
.spot-hist { position:absolute; top:8px; right:8px; z-index:5; border-radius:4px 4px 0 0; border:1px solid rgba(0,0,0,0.15); display:none; box-shadow:0 2px 8px rgba(0,0,0,0.18); }


.spot-btns { display:none; width:100%; margin-top:5px; gap:4px; justify-content:space-between; }
.spot-btns.visible { display:flex; }
.spot-btn-pair { display:flex; flex:1; min-width:0; gap:0; }
.spot-btn-main { flex:1; min-width:0; background:var(--surface); border:1px solid var(--border); border-right:none; border-radius:4px 0 0 4px; color:var(--text); font-family:var(--font-mono); font-size:9px; padding:5px 4px; cursor:pointer; text-align:left; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
.spot-btn-main:active { opacity:0.7; }
.spot-btn-main.ok  { border-color:var(--green);  color:var(--green);  }
.spot-btn-main.warn{ border-color:var(--amber);  color:var(--amber);  }
.spot-btn-main.bad { border-color:var(--red);    color:var(--red);    }
.spot-btn-main.active { border-color:var(--accent); color:var(--accent); }
.spot-btn-del { background:var(--surface); border:1px solid var(--border); border-radius:0 4px 4px 0; color:var(--muted); font-family:var(--font-mono); font-size:10px; padding:5px 7px; cursor:pointer; }
.spot-btn-del:active { color:var(--red); border-color:var(--red); }
.timing { display:none; }
.result-area { margin-top:8px; }
.creative-calc { position:absolute; top:0; left:0; right:0; z-index:5; padding:10px; background:var(--surface); border:1px solid var(--border); border-radius:6px; }
.creative-ttl { font-size:9px; color:var(--accent); letter-spacing:1px; margin-bottom:6px; }
.creative-tbl { width:100%; border-collapse:collapse; font-size:10px; line-height:1.9; table-layout:fixed; }
.creative-tbl col:nth-child(1){width:52px}.creative-tbl col:nth-child(2){width:48px}.creative-tbl col:nth-child(3){width:44px}.creative-tbl col:nth-child(4){width:20px}
.creative-tbl td { padding:2px 5px; border-bottom:1px solid var(--border); }
.creative-tbl tr:last-child td { border-bottom:none; }
.creative-tbl .opt { color:var(--accent); font-weight:bold; }
.exif-info { min-height:52px; background:var(--surface); border:1px solid var(--border); border-radius:5px; padding:5px 8px; margin-top:5px; font-size:9px; color:var(--muted); line-height:1.7; }
.warnings { background:var(--surface); border:1px solid var(--amber); border-radius:6px; padding:6px 10px; margin-bottom:8px; font-size:9px; color:var(--amber); line-height:1.8; }
.tbl { width:100%; border-collapse:collapse; border:1px solid var(--border); border-radius:6px; overflow:hidden; font-size:10px; margin-bottom:8px; }
.tbl th { background:var(--surface); color:var(--muted); font-size:8px; letter-spacing:1px; text-transform:uppercase; padding:3px 4px; border-bottom:1px solid var(--border); text-align:left; }
.tbl th.hz { color:var(--accent); }
.tbl td { padding:0 4px; border-bottom:1px solid var(--border); vertical-align:middle; height:18.8px; max-height:18.8px; line-height:18.8px; font-size:9px; white-space:nowrap; overflow:hidden; }
.tbl tr:last-child td { border-bottom:none; }
.tbl tr.sep td { border-top:1px solid var(--border); background:rgba(255,255,255,0.01); height:18.8px; max-height:18.8px; }
.frame-results { margin-top:12px; border-top:1px solid var(--border); padding-top:8px; }
.frame-ttl { font-size:9px; color:var(--blue); letter-spacing:1px; margin-bottom:6px; text-transform:uppercase; }
.frame-tbl td:first-child { width:40%; }
.lbl { color:var(--muted); font-size:9px; white-space:nowrap; min-width:72px; }
.vK{color:var(--accent);font-weight:bold;} .vM{color:var(--magenta);font-weight:bold;} .vG{color:var(--green);font-weight:bold;}
.vN{color:var(--muted);} .vA{color:var(--amber);} .vBl{color:var(--blue);} .vR{color:var(--muted);font-size:9px;}
.rR{color:#e05050;} .rG{color:#3ecf6a;} .rB{color:#4a8fe8;}
.cmp-box{padding:7px 10px;background:var(--surface);border:1px solid var(--border);border-radius:6px;font-size:10px;line-height:2;margin-bottom:8px;}
.cmp-ttl{font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:3px;}
.range-box{padding:7px 10px;background:var(--surface);border:1px solid var(--border);border-radius:6px;font-size:10px;line-height:2;margin-bottom:8px;}
.range-ttl{font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:2px;}
.timing-box{padding:6px 10px;background:var(--surface);border:1px solid var(--border);border-radius:6px;font-size:9px;color:var(--muted);line-height:1.9;margin-bottom:8px;}
.t-slow{color:var(--red)!important;}
.warn{color:var(--amber);}
</style>
</head>
<body>
<div class="slot">
  <!-- col 1: превью или творческий калькулятор -->
  <div class="left-col">
    <div id="creativeCalcA" class="creative-calc">
      <div class="creative-ttl">ТВОРЧЕСКИЙ КАЛЬКУЛЯТОР</div>
      <div style="font-size:9px;color:var(--muted);margin-bottom:8px">Введите K из приложения на телефоне</div>
      <div style="display:flex;gap:6px;margin-bottom:10px">
        <input id="tInputA" type="number" min="1000" max="15000" placeholder="напр. 4823"
          style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:var(--font-mono);font-size:12px;padding:6px 8px">
        <button onclick="renderCreativeTable('A')"
          style="background:var(--accent);color:#000;border:none;border-radius:5px;font-family:var(--font-mono);font-size:11px;font-weight:bold;padding:6px 10px;cursor:pointer">K</button>
      </div>
      <div id="creativeTableA"></div>
    </div>
    <div id="photoWrapContainerA">
    <div class="photo-wrap" id="wrapA">
      <div class="photo-inner" id="innerA">
        <canvas class="photo-canvas" id="canvasA"></canvas>
        <canvas class="circles-canvas" id="circlesA"></canvas>
        <canvas class="spot-hist" id="spotHistA" width="208" height="116"></canvas>

        <div class="placeholder" id="phA">📷</div>
        <div class="progress-overlay" id="progressOverlayA">
          <div class="spinner-wrap">
            <div class="spinner"></div>
            <div class="spinner-pct" id="progressPctA"></div>
          </div>
          <div class="progress-label" id="progressLabelA"></div>
        </div>
      </div><!-- /innerA -->
    </div><!-- /wrapA -->
    </div><!-- /photoWrapContainerA -->
  </div>
  <!-- col 2: управление + расчёты -->
  <div class="mid-col">
    <div style="position:relative;margin-bottom:10px">

/* ═══ АРХИТЕКТУРНЫЕ РЕШЕНИЯ — НЕ МЕНЯТЬ ═══

// GM_COEFF: используется CONFIG.WB.GM_COEFF (дефолт 0.07)

function escapeHtml(s){if(s===null||s===undefined)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── Эталонные заглушки объектов — единственный источник правды о форме ──
// Используются в renderDiag и assertShapeMatch. Добавить поле здесь = добавить везде.
const FRM_FALLBACK={

// assertShapeMatch: проверяет что все ключи эталона есть в реальном объекте
// console.warn всегда + dbgLog в буфер (виден при открытии дебага в любой момент)
function assertShapeMatch(real, fallback, name){
  if(!real) return;
  for(const k of Object.keys(fallback)){

// MATH — Temperature & WB calculations
// ═══════════════════════════════════════════════════
// T_MIN/T_MAX: используем CONFIG.WB.TEMP_MIN / CONFIG.WB.TEMP_MAX
function Temperature_to_RGB(T){
  let xD;
  if(T<=4000)xD=0.27475e9/(T*T*T)-0.98598e6/(T*T)+1.17444e3/T+0.145986;
  else if(T<=7000)xD=-4.6070e9/(T*T*T)+2.9678e6/(T*T)+0.09911e3/T+0.244063;
  else xD=-2.0064e9/(T*T*T)+1.9018e6/(T*T)+0.24748e3/T+0.237040;
  const yD=-3*xD*xD+2.87*xD-0.275,X=xD/yD,Y=1,Z=(1-xD-yD)/yD;
  const RGB=[0,0,0];let max=0;
  for(let c=0;c<3;c++){RGB[c]=X*XYZ_to_RGB[0][c]+Y*XYZ_to_RGB[1][c]+Z*XYZ_to_RGB[2][c];if(RGB[c]>max)max=RGB[c];}
  for(let c=0;c<3;c++)RGB[c]/=max;
  return RGB;
}
function RGB_to_Temperature(rgb){
  const r=Math.max(rgb[0],0.001),g=Math.max(rgb[1],0.001),b=Math.max(rgb[2],0.001);
  let Tmin=CONFIG.WB.TEMP_MIN,Tmax=CONFIG.WB.TEMP_MAX,tRGB;
  while(Tmax-Tmin>0.1){const Tm=(Tmax+Tmin)/2;tRGB=Temperature_to_RGB(Tm);if(tRGB[2]/tRGB[0]>b/r)Tmax=Tm;else Tmin=Tm;}
  const T=(Tmax+Tmin)/2;tRGB=Temperature_to_RGB(T);
  let green=(tRGB[1]/tRGB[0])/(g/r);
  green=Math.max(0.2,Math.min(2.5,green));
  return{T,green};
}
function greenToSteps(green){return(green-1.0)/CONFIG.WB.GM_COEFF;}
function calcStepsBA(T_exact,T_alt){
  const delta=CONFIG.WB.MIRED_SCALE/T_alt-CONFIG.WB.MIRED_SCALE/T_exact,stepsBA=delta/5;
  return{stepsBA,stepsBA_int:Math.max(-9,Math.min(9,Math.round(stepsBA)))};
}
function srgbToLinear(v8){const s=v8/255;return s<=0.04045?s/12.92:Math.pow((s+0.055)/1.055,2.4);}
function calcWB(R8,G8,B8,lin){
  if(R8<2&&G8<2&&B8<2)return{T_exact:5500,T_base:5500,T_remainder:0,green:1,stepsGM:0,stepsGM_int:0,stepsBA:0,stepsBA_int:0,valid:false};
  let r,g,b;
  if(lin){r=srgbToLinear(R8);g=srgbToLinear(G8);b=srgbToLinear(B8);}
  else{r=R8/255;g=G8/255;b=B8/255;}
  const{T,green}=RGB_to_Temperature([r,g,b]);
  const stepsGM=greenToSteps(green),stepsGM_int=Math.max(-9,Math.min(9,Math.round(stepsGM)));
  const T_base=Math.round(T/100)*100,T_remainder=T-T_base;
  const{stepsBA,stepsBA_int}=calcStepsBA(T,T_base);
  return{T_exact:T,T_base,T_remainder,green,stepsGM,stepsGM_int,stepsBA,stepsBA_int,valid:true};
}

// ── N2: applyBACorr — коррекция T_exact на B/A сдвиг камеры (FUTURE §1.1-B) ──
// wbShiftBA: +=Amber, −=Blue (EXIF ARCH_SPEC §4.2). 1 шаг = 5 mired.
// Камера запекает B/A сдвиг в пиксели → T_exact смещён → вычитаем через mired.
// Знак: Blue (−) делает пиксели нейтральнее → T_exact завышен → mired растёт → T падает.
function applyBACorr(wb, baShift){
  if(!baShift) return wb;
  const mired = CONFIG.WB.MIRED_SCALE/wb.T_exact - baShift * CONFIG.WB.MIRED_STEP;
  const T_exact = CONFIG.WB.MIRED_SCALE / Math.max(1, mired);
  const T_base = Math.round(T_exact/100)*100;
  const T_remainder = T_exact - T_base;
  const{stepsBA,stepsBA_int} = calcStepsBA(T_exact, T_base);
  return{...wb, T_exact, T_base, T_remainder, stepsBA, stepsBA_int};
}

function getPatchWarnings(R8,G8,B8){
  const warns=[];
  if(Math.max(R8,G8,B8)>245)warns.push('⚠ пересвет');
  if((R8+G8+B8)/3<15)warns.push('⚠ темно');
  if(B8<5)warns.push('⚠ синий клипован');
  return warns;
}

function setUIState(slotId, state){
  const prev=document.body.dataset['state'+slotId.toLowerCase()];

  if(state==='empty'){

             btn.onclick=()=>{if(!_fileLoaded_A)document.getElementById('file'+slotId).click();}; }
    if(exp){ exp.disabled=true; }
  }
  else if(state==='loading'){
    if(cv){ cv.classList.add('loading'); }
    if(btn){ btn.classList.add('loading'); }
    if(exp){ exp.disabled=true; exp.style.opacity=''; }

  else if(state==='loaded'){
    if(cv){ cv.classList.remove('loading'); cv.style.display='block'; }
    if(btn){ btn.classList.remove('loading'); }

}

// ── §17.3 dbgLog — кольцевой буфер событий (50 записей) ──
const _dbgLog = [];
function dbgLog(msg){
  const ts=performance.now().toFixed(0);
  _dbgLog.push('['+ts+'ms] '+msg);
  if(_dbgLog.length>50)_dbgLog.shift();
  if(!_debugOpen) return;
  const out=document.getElementById('_dbgLog');
  if(out){out.textContent=_dbgLog.slice(-12).join('\n');out.style.display='block';}
}

// ── §17.5 perfMark — накопление min/max/avg per-operation ──
const _perf={};
function perfMark(name,ms){
  // всегда накапливать, показывать только при открытой панели
  if(!_perf[name])_perf[name]={n:0,sum:0,min:Infinity,max:0};
  const p=_perf[name];p.n++;p.sum+=ms;
  p.min=Math.min(p.min,ms);p.max=Math.max(p.max,ms);
  const avg=(p.sum/p.n).toFixed(1);
  const perfEl=document.getElementById('_dbgPerf');
  if(perfEl)perfEl.textContent=Object.entries(_perf)
    .map(([k,v])=>`${k}: avg=${( v.sum/v.n).toFixed(1)}ms min=${v.min} max=${v.max} n=${v.n}`)
    .join('\n');
}

// ── §17.4 window.onerror — глобальный перехват ──
window.onerror=function(msg,src,line,col,err){

};
window.onunhandledrejection=function(e){

};

function drawSuperDiag(){
  const cvs=document.getElementById('_superCanvas');
  if(!cvs)return;
  const ctx=cvs.getContext('2d');
  const W=cvs.width,H=cvs.height;
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#0d0d12';ctx.fillRect(0,0,W,H);
  const r=document.getElementById('resultA');
  const rep=r&&r._report?r._report:null;
  const ss=rep&&rep.superSpot&&rep.superSpot.valid?rep.superSpot:null;
  const sp600=rep&&rep.spots&&rep.spots[0]?rep.spots[0]:null;
  const info=document.getElementById('_superInfo');
  if(!ss){
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='13px ui-monospace,monospace';
    ctx.textAlign='center';ctx.fillText('Нет данных суперспота',W/2,H/2);
    if(info)info.textContent='';return;
  }
  const NBINS=17,BSTEP=15;
  const bins=Array.from({length:NBINS},(_,i)=>(i*BSTEP)+'-'+(i*BSTEP+BSTEP));
  // Y-бины суперспота: расширяем из yBins[5] в 17 бинов
  const ssY5=ss.yBins||[0,0,0,0,0];
  const ssY=Array.from({length:NBINS},(_,i)=>{const src=Math.min(4,Math.floor(i*BSTEP/50));return Math.round(ssY5[src]/(50/BSTEP));});
  const ssTotal=ssY.reduce((s,v)=>s+v,0)||1;
  const p6Y=new Array(NBINS).fill(0);
  if(sp600&&sp600.patchLarge&&sp600.patchLarge._hR){
    const hR=sp600.patchLarge._hR,hG=sp600.patchLarge._hG,hB=sp600.patchLarge._hB;
    for(let i=0;i<256;i++){
      const cnt=Math.round(((hR[i]||0)+(hG[i]||0)+(hB[i]||0))/3);
      p6Y[Math.min(NBINS-1,Math.floor(i/BSTEP))]+=cnt;
    }
  }
  const p6Total=p6Y.reduce((s,v)=>s+v,0)||1;
  const ssP=ssY.map(v=>v/ssTotal*100);
  const p6P=p6Y.map(v=>v/p6Total*100);
  const maxP=Math.max(...ssP,...p6P,1);
  const padL=36,padR=10,padT=22,padB=38;
  const bw=(W-padL-padR)/NBINS;
  const barW=bw*0.33;
  // Заголовок
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='bold 10px ui-monospace,monospace';
  ctx.textAlign='left';ctx.fillText('Y-распределение нейтральных пикселей',padL,14);
  // Легенда
  ctx.fillStyle='rgba(196,127,255,0.85)';ctx.fillRect(W-88,5,9,8);
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='9px ui-monospace,monospace';
  ctx.textAlign='left';ctx.fillText('Суперспот',W-76,13);
  ctx.fillStyle='rgba(255,200,80,0.8)';ctx.fillRect(W-88,17,9,8);
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fillText('Спот 600',W-76,25);
  for(let i=0;i<NBINS;i++){
    const x=padL+i*bw;
    const hSS=ssP[i]/maxP*(H-padT-padB);
    const hP6=p6P[i]/maxP*(H-padT-padB);
    ctx.fillStyle='rgba(196,127,255,0.85)';
    ctx.fillRect(x+bw/2-barW-1,H-padB-hSS,barW,hSS);
    ctx.fillStyle='rgba(255,200,80,0.75)';
    ctx.fillRect(x+bw/2+1,H-padB-hP6,barW,hP6);
    if(ssP[i]>0.5){ctx.fillStyle='#c47fff';ctx.font='8px ui-monospace,monospace';ctx.textAlign='center';ctx.fillText(ssP[i].toFixed(0)+'%',x+bw/2-barW/2-1,H-padB-hSS-3);}
    if(p6P[i]>0.5){ctx.fillStyle='rgba(255,200,80,0.9)';ctx.font='8px ui-monospace,monospace';ctx.textAlign='center';ctx.fillText(p6P[i].toFixed(0)+'%',x+bw/2+barW/2+1,H-padB-hP6-3);}
    ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font='8px ui-monospace,monospace';ctx.textAlign='center';
    ctx.fillText(bins[i],x+bw/2,H-padB+11);
  }
  ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(padL,padT);ctx.lineTo(padL,H-padB);ctx.stroke();
  ctx.beginPath();ctx.moveTo(padL,H-padB);ctx.lineTo(W-padR,H-padB);ctx.stroke();
  const sigNorm=ss.sigR!=null?`σR/Y=${ss.sigR} σG/Y=${ss.sigG} σB/Y=${ss.sigB}`:'';
  const yMode=ss.yBins?'Y-мода: '+(ss.yBins.indexOf(Math.max(...ss.yBins))*50+25)+'–'+(ss.yBins.indexOf(Math.max(...ss.yBins))*50+75):'';
  const infoTxt=`count=${ss.count.toLocaleString()}px  σT=${ss.sigma_T}K  ${sigNorm}  ${yMode}`;
  const p6Info=sp600&&sp600.patchLarge?`Спот600: count=${sp600.patchLarge.count.toLocaleString()}px  med=${sp600.patchLarge.medR}/${sp600.patchLarge.medG}/${sp600.patchLarge.medB}  Y-бины:${p6Y.join('/')}`:'';
  const ssInfo=`Суперспот: ${infoTxt}  Y-бины:${ssY.join('/')}`;
  if(info){info.innerHTML=`<span style='user-select:all;cursor:copy' title='Нажмите чтобы скопировать'>${ssInfo}</span>`
    +(p6Info?`<br><span style='user-select:all;cursor:copy'>${p6Info}</span>`:'');}

}
// ── makeDraggable — перетаскивание панели за заголовок (touch + mouse) ──
function makeDraggable(panel, handle){
  if(!handle)return;
  if(handle._draggable)return; // C3.1: предотвращаем накопление listeners при повторном вызове
  handle._draggable=true;
  let sx=0,sy=0,ox=0,oy=0,dragging=false;
  function getPos(){
    const r=panel.getBoundingClientRect();
    return{x:r.left,y:r.top};
  }
  function start(cx,cy){
    const r0=panel.getBoundingClientRect();
    const savedL=r0.left,savedT=r0.top;
    panel.style.transform='none';
    panel.style.bottom='auto';panel.style.right='auto';
    panel.style.margin='0';
    void panel.offsetHeight;
    panel.style.left=savedL+'px';panel.style.top=savedT+'px';
    ox=savedL;oy=savedT;sx=cx;sy=cy;
    dragging=true;
    handle.style.cursor='grabbing';
  }
  function move(cx,cy){
    if(!dragging)return;
    const pw=panel.offsetWidth||200,ph=panel.offsetHeight||100;
    const newL=Math.max(0,Math.min(window.innerWidth-pw,ox+(cx-sx)));
    const newT=Math.max(0,Math.min(window.innerHeight-ph,oy+(cy-sy)));
    panel.style.left=newL+'px';
    panel.style.top=newT+'px';
  }
  function end(){ dragging=false; handle.style.cursor='grab'; }
  handle.style.cursor='grab';handle.style.userSelect='none';
  handle.addEventListener('mousedown',e=>{start(e.clientX,e.clientY);e.preventDefault();});
  document.addEventListener('mousemove',e=>{move(e.clientX,e.clientY);});
  document.addEventListener('mouseup',end);
  handle.addEventListener('touchstart',e=>{const t=e.touches[0];start(t.clientX,t.clientY);e.preventDefault();},{passive:false});
  document.addEventListener('touchmove',e=>{if(!dragging)return;const t=e.touches[0];move(t.clientX,t.clientY);e.preventDefault();},{passive:false});
  document.addEventListener('touchend',end);
}

function assertUIState(slotId, state){
  if(!_debugOpen) return;
  const el  = id => document.getElementById(id+slotId);
  const cs  = id => { const e=el(id); return e?getComputedStyle(e):null; };
  const isHidden  = id => { const s=cs(id); return s&&(s.display==='none'||s.visibility==='hidden'); };
  const isVisible = id => { const s=cs(id); return s&&s.display!=='none'&&s.visibility!=='hidden'; };
  const checks = {
    empty: [
      [()=>isVisible('creativeCalc'),  'creativeCalc виден'],
      [()=>isVisible('ph'),            'placeholder виден'],
      [()=>isVisible('spotRow'),       'spotRow виден (всегда)'],
      [()=>isHidden('spotHist'),       'spotHist скрыт'],
      [()=>!el('canvas')?.classList.contains('loading'), 'canvas без blur'],
    ],
    loading: [
      [()=>isHidden('creativeCalc'),   'creativeCalc скрыт'],
      [()=>isHidden('ph'),             'placeholder скрыт'],
      [()=>isVisible('spotRow'),       'spotRow виден (всегда)'],
      [()=>isHidden('spotHist'),       'spotHist скрыт'],
      [()=>el('canvas')?.classList.contains('loading'), 'canvas blur'],
      [()=>{const s=cs('progressOverlay');return s&&s.display==='flex';}, 'overlay показан'],
    ],
    loaded: [
      [()=>isHidden('creativeCalc'),   'creativeCalc скрыт'],
      [()=>isHidden('ph'),             'placeholder скрыт'],
      [()=>isVisible('spotRow'),       'spotRow виден'],
      [()=>!el('canvas')?.classList.contains('loading'), 'canvas без blur'],
    ],
  };
  const list = checks[state]||[];
  list.forEach(([fn, label])=>{
    try{
      if(!fn()) console.warn(`[UIAssert] ${slotId} ${state}: FAIL — ${label}`);
      else       console.log (`[UIAssert] ${slotId} ${state}: ok  — ${label}`);
    }catch(e){ console.error(`[UIAssert] ${slotId} ${state}: ERR — ${label}`, e); }
  });
  if(state==='loaded') assertUIContent(slotId);
}

function assertUIContent(slotId){
  if(!_debugOpen) return;
  const dbgOut = document.getElementById('_dbgOut');
  if(dbgOut){ dbgOut.textContent='[Audit]\n'; dbgOut.style.display='block'; }
  let fails=[], warns=[];
  const log = (ok, label, isWarn) => {
    const line = (ok?'✓ ':'✗ ')+label;
    if(!ok){ if(isWarn) warns.push(label); else fails.push(label); }
    if(ok) console.log('[UIContent] ok  — '+label);
    else   console.warn('[UIContent] FAIL — '+label);
    if(dbgOut) dbgOut.textContent += line+'\n';
  };
  const el = id => document.getElementById(id+slotId);
  const check = (label, fn, isWarn) => {
    try{ log(fn(), label, isWarn); }
    catch(e){ log(false, label+' ERR:'+e.message, isWarn); }
  };
  const exif = el('exifInfo');
  check('exifInfo не пустой', ()=> exif && exif.textContent.trim().length > 0);
  const result = el('result');
  check('result существует', ()=> !!result);
  check('result не пустой', ()=> result && result.textContent.trim().length > 0);
  const table = document.getElementById('table'+slotId);
  check('table существует', ()=> !!table);
  const hist = el('spotHist');
  if(hist && getComputedStyle(hist).display !== 'none'){
    const hasCanvas = hist.querySelector('canvas') !== null;
    if(dbgOut) dbgOut.textContent += (hasCanvas?'✓':'ℹ')+' spotHist canvas: '+(hasCanvas?'есть':'нет (спот не выбран)')+'\n';
  }
  // summary
  if(dbgOut){
    dbgOut.textContent += '─────────────────────\n';
    if(fails.length===0 && warns.length===0){
      dbgOut.textContent += '✅ Всё OK\n';
    } else {
      if(fails.length) dbgOut.textContent += '🔴 Проблема: '+fails.join(', ')+'\n';
      if(warns.length) dbgOut.textContent += '⚠️  Внимание: '+warns.join(', ')+'\n';
    }
  }
}

function dumpUIState(slotId){
  const ids = ['creativeCalc','ph','canvas','circles','spotRow','spotHist',
               'autoBtn','result','table','exifInfo','progressOverlay'];
  const lines = [`=== dumpUIState ${slotId} @ ${new Date().toISOString()} ===`,
                 `state: ${document.body.dataset['state'+slotId]||'?'}`];
  ids.forEach(id=>{
    const e = document.getElementById(id+slotId);
    if(!e){ lines.push(`  #${id}${slotId}: NOT FOUND`); return; }
    const cs = getComputedStyle(e);
    lines.push(`  #${id}${slotId}: display=${cs.display} visibility=${cs.visibility} classList=[${e.classList}]`);
  });
  const dump = lines.join('\n');
  console.log(dump);
  // clipboard намеренно не вызывается — вызывает диалог разрешений на iOS
  // показать в панели
  const dbgOut = document.getElementById('_dbgOut');
  if(dbgOut){
    dbgOut.textContent = dump;
    dbgOut.style.display='block';
    const notFound = lines.filter(l=>l.includes('NOT FOUND')).length;
    const hidden   = lines.filter(l=>l.includes('display=none')).length;
    const state    = document.body.dataset['state'+slotId]||'?';
    dbgOut.textContent += '\n─────────────────────\n';
    if(notFound===0 && hidden<=6)
      dbgOut.textContent += '✅ state='+state+' · все элементы найдены\n';
    else
      dbgOut.textContent += (notFound?'🔴 NOT FOUND: '+notFound+'\n':'')+
                            (hidden>6?'⚠️ скрыто: '+lines.filter(l=>l.includes('display=none')).map(l=>l.trim().split(':')[0].replace('#','')).join(', ')+'\n':'');
  }
  return dump;
}

let _tourTimers=[];
function autoTour(slotId){
  // очистка при повторном вызове — race condition guard
  _tourTimers.forEach(id=>clearTimeout(id));
  _tourTimers=[];
  const _t=(fn,ms)=>{const id=setTimeout(fn,ms);_tourTimers.push(id);return id;};
  const dbgOut = document.getElementById('_dbgOut');
  if(dbgOut){ dbgOut.textContent=''; dbgOut.style.display='block'; }
  const t0=performance.now();
  const log=(msg)=>{
    const ms=(performance.now()-t0).toFixed(0);
    const line='[AutoTour +'+ms+'ms] '+msg;
    console.log(line);
    if(dbgOut){dbgOut.style.display='block';dbgOut.textContent+=line+'\n';}
  };
  const withFile=typeof _fileLoaded_A!=='undefined'&&_fileLoaded_A;
  log('старт · '+(withFile?'файл загружен':'без файла'));

  // 1. empty
  log('1/7 → empty');
  setUIState(slotId,'empty');

  _t(()=>{
    // 2. loading
    log('2/7 → loading');
    setUIState(slotId,'loading');
    updateProgress(slotId,40,'Auto-Tour...');
  },800);

  _t(()=>{
    // 3. loaded
    log('3/7 → loaded');
    updateProgress(slotId,100,'');
    setUIState(slotId,'loaded');
  },2500);

  _t(()=>{
    // 3а–3в: только если файл загружен
    if(withFile){
      const t1=performance.now();
      try{
        runAutoSpots&&runAutoSpots();
        log('3а → autoSpots ('+(performance.now()-t1).toFixed(0)+'ms)'+
          (window._lastSpots&&window._lastSpots[0]?' score='+Math.round(window._lastSpots[0].score):''));
      }catch(e){log('3а ❌ autoSpots: '+e.message);}
      // 3б superSpot
      const r=document.getElementById('result'+slotId);
      if(r&&r._report&&r._report.superSpot){
        const ss=r._report.superSpot;
        log('3б → superSpot valid='+ss.valid+(ss.valid?' count='+ss.count+' σT='+ss.sigma_T+'K':''));
      } else { log('3б → superSpot: нет данных в _report'); }
      // 3в таблица
      const tbl=document.getElementById('table'+slotId);
      const len=tbl?tbl.innerHTML.length:0;
      log('3в → таблица: '+(len>0?len+' символов ✓':'пустая ❌'));
    }
  },3200);

  _t(()=>{
    // 4. Вектор open
    const t4=performance.now();
    try{
      toggleVectorPanel();
      const cv=document.getElementById('_vecCanvas');
      log('4/7 → Вектор open ('+(performance.now()-t4).toFixed(0)+'ms) canvas='+
        (cv?cv.width+'×'+cv.height:'❌ не найден')+
        (withFile?'':' · масштаб не проверить — нет данных'));
    }catch(e){log('4/7 ❌ Вектор: '+e.message);}
  },withFile?4200:3200);

  _t(()=>{
    // 5. Гист open
    const t5=performance.now();
    try{
      toggleHistPanel();
      const ch=document.getElementById('_histCanvas');
      log('5/7 → Гист open ('+(performance.now()-t5).toFixed(0)+'ms) canvas='+
        (ch?ch.width+'×'+ch.height:'❌ не найден'));
    }catch(e){log('5/7 ❌ Гист: '+e.message);}
  },withFile?5000:4000);

  _t(()=>{
    // 6. Закрыть панели
    const vp=document.getElementById('_vecPanel');
    const hp=document.getElementById('_histPanel');
    if(vp&&vp.style.display!=='none') toggleVectorPanel();
    if(hp&&hp.style.display!=='none') toggleHistPanel();
    log('6/7 → панели закрыты ✓');
  },withFile?5800:4800);

  _t(()=>{
    // 7. Финал
    log('7/7 → сброс');
    resetSlot(slotId);
    setTimeout(()=>{
      const ms=(performance.now()-t0).toFixed(0);
      log('✅ Auto-Tour завершён за '+ms+'ms');
    },100);
  },withFile?6800:5800);
}

function updateProgress(slotId, percent, message) {
  const overlay = document.getElementById('progressOverlay' + slotId);
  const label   = document.getElementById('progressLabel'  + slotId);
  const pctEl   = document.getElementById('progressPct'    + slotId);
  if (!overlay) return;
  if (percent >= 100) {
    if (_progressTimers[slotId]) clearTimeout(_progressTimers[slotId]);
    _progressTimers[slotId] = setTimeout(() => {
      overlay.style.display = 'none';
      delete _progressTimers[slotId];
    }, 400);
  } else {
    overlay.style.display = 'flex';
  }
  if (pctEl) pctEl.textContent = percent < 100 ? Math.round(percent)+'%' : '';
  if (label) label.textContent = message || '';
}

// EXIF — parser (Canon MakerNote, Apple, IFD0)
// ═══════════════════════════════════════════════════
// ── IFD0: Make, Model, Orientation, ExifIFD pointer ──────────────────────────
function _parseIFD0(r16,r32,str,res){
  let exifPtr=null;
  try{
    const i0=r32(4),n0=r16(i0);
    for(let i=0;i<n0;i++){
      const e=i0+2+i*12,t=r16(e);
      if(t===0x010F)res.make=str(e);
      if(t===0x0110)res.model=str(e);
      if(t===0x0112)res.orientation=r16(e+8);
      if(t===0x0132)res.dateTime=str(e);
      if(t===0x8769)exifPtr=r32(e+8);
    }
  }catch{}
  return exifPtr;
}
// ── ExifIFD: ISO, WBMode, LensModel, DigitalZoom, MakerNote pointer ──────────
function _parseExifIFD(r16,r32,str,rat,res,exifPtr){
  let mOff=null;
  try{
    const n1=r16(exifPtr);
    for(let i=0;i<n1;i++){
      const e=exifPtr+2+i*12,t=r16(e);
      if(t===0x927C)mOff=r32(e+8);
      if(t===0x8827)res.iso=r16(e+8);
      if(t===0xA403)res.wbMode=r16(e+8);
      if(t===0xA434)res.lensModel=str(e);
      if(t===0xA404)res.digitalZoom=rat(e);
      if(t===0x829A){const v=rat(e);res.exposureTime=v!=null?(v<1?'1/'+ Math.round(1/v):v.toFixed(1)):null;}
      if(t===0x829D)res.fNumber=rat(e);
      if(t===0x920A)res.focalLength=rat(e);
      if(t===0x9204){const o=ts+r32(e+8);const n=r32(o),d=r32(o+4);res.exposureBias=d?(n/d):0;}
      if(t===0x9209)res.flash=r16(e+8);
      if(t===0x9207)res.meteringMode=r16(e+8);
    }
  }catch{}
  return mOff;
}
// ── Canon MakerNote: ColorTemp, WBShiftAB, WBShiftGM (R12.2) ─────────────────
function _parseCanonMakerNote(r16,r32,rs16,res,mOff){
  try{
    const mn=r16(mOff);
    for(let i=0;i<Math.min(mn,100);i++){
      const e=mOff+2+i*12,t=r16(e),cnt=r32(e+4);
      if(t===0x00a0&&cnt>=14){
        const d=cnt*2>4?r32(e+8):(e+8);
        res.colorTemp=rs16(d+9*2);
        res.wbShiftBA=rs16(d+12*2);
        res.wbShiftMG=rs16(d+13*2);
      }
    }
  }catch{res.error='Canon MakerNote повреждён';}
}
async function parseExif(file){
  const res={make:null,model:null,orientation:1,iso:null,wbMode:null,
    colorTemp:null,wbShiftBA:null,wbShiftMG:null,lensModel:null,digitalZoom:null,
    exposureTime:null,fNumber:null,focalLength:null,exposureBias:null,flash:null,meteringMode:null,dateTime:null,error:null};
  let buf;
  try{buf=await file.slice(0,CONFIG.EXIF.BUF_SIZE).arrayBuffer();}catch{return null;}
  const v=new DataView(buf);
  // Find TIFF start inside APP1/EXIF marker (FF E1 ... "Exif")
  let ts=null;
  try{
    let off=2;
    while(off<buf.byteLength-10){
      if(v.getUint8(off)===0xFF&&v.getUint8(off+1)===0xE1){
        const s=new Uint8Array(buf,off+4,4);
        if(s[0]===0x45&&s[1]===0x78&&s[2]===0x69&&s[3]===0x66){ts=off+10;break;}
      }
      const l=v.getUint16(off+2,false);if(l<2)break;off+=2+l;
    }
  }catch{}
  if(ts===null){res.error='EXIF не найден';return res;}
  const le=v.getUint8(ts)===0x49; // little-endian flag
  const r16=o=>v.getUint16(ts+o,le);
  const r32=o=>v.getUint32(ts+o,le);
  const rs16=o=>v.getInt16(ts+o,le);
  function str(e){
    const cnt=r32(e+4),o=cnt>4?r32(e+8):(e+8);
    let s='';
    for(let i=0;i<cnt-1;i++){const ch=v.getUint8(ts+o+i);if(!ch)break;s+=String.fromCharCode(ch);}
    return s.trim();
  }
  function rat(e){const o=ts+r32(e+8),d=r32(o+4);return d?r32(o)/d:null;}
  const exifPtr=_parseIFD0(r16,r32,str,res);
  if(!exifPtr)return res;
  const mOff=_parseExifIFD(r16,r32,str,rat,res,exifPtr);
  if(res.make==='Canon'&&mOff!==null)
    _parseCanonMakerNote(r16,r32,rs16,res,mOff);
  return res;
}

function histMedian(h,total){
  let acc=0,half=total/2;
  for(let i=0;i<256;i++){acc+=h[i];if(acc>=half)return i;}
  return 255;
}
function histMean(h,total){
  let s=0;for(let i=0;i<256;i++)s+=i*h[i];return s/total;
}
function histSigma(h,total,mean){
  let s=0;for(let i=0;i<256;i++)s+=h[i]*(i-mean)*(i-mean);return Math.sqrt(s/total);
}
// Trimmed mean 5%-95%: устойчивее медианы при шуме, использует больше данных
function histTrimmedMean(h,total){
  if(!total)return 0;
  const skip=Math.round(total*0.05);
  const end=total-skip;
  let count=0,sum=0,included=0;
  for(let i=0;i<256;i++){
    const n=h[i];
    if(!n){count+=0;continue;}
    // сколько пикселей из этого бина попадает в диапазон [skip+1 .. end]
    const lo=count,hi=count+n; // [lo, hi) позиции
    const inLo=Math.max(lo,skip);
    const inHi=Math.min(hi,end);
    if(inHi>inLo){sum+=i*(inHi-inLo);included+=(inHi-inLo);}
    count+=n;
  }
  return included>0?sum/included:histMean(h,total);
}
// histSigmaTrim: σ-trim — оставляем пиксели в [mean-2σ, mean+2σ], пересчёт mean
// O(256) по гистограмме = O(1) от числа пикселей. Точнее percentile-trim на неравномерных распределениях.
function histSigmaTrim(h, total){
  if(!total)return 0;
  const mean=histMean(h,total);
  const sigma=histSigma(h,total,mean);
  const lo=Math.max(0,Math.floor(mean-2*sigma));
  const hi=Math.min(255,Math.ceil(mean+2*sigma));
  let sum=0,n=0;
  for(let i=lo;i<=hi;i++){sum+=i*h[i];n+=h[i];}
  return n>0?sum/n:mean;
}

async function sampleWholeFrame(canvas,onChunk){

function toOrig(ox,oy,el,oW,oH){
  const dW=el.clientWidth,dH=el.clientHeight,sc=Math.min(dW/oW,dH/oH);
  const iW=oW*sc,iH=oH*sc,pX=(dW-iW)/2,pY=(dH-iH)/2;
  if(ox<pX||ox>pX+iW||oy<pY||oy>pY+iH)return null;
  return{x:Math.round((ox-pX)/sc),y:Math.round((oy-pY)/sc)};
}
function toScr(x,y,el,oW,oH){
  const dW=el.clientWidth,dH=el.clientHeight,sc=Math.min(dW/oW,dH/oH);
  return{x:(dW-oW*sc)/2+x*sc,y:(dH-oH*sc)/2+y*sc};
}
function drawArcText(ctx,text,cx,cy,r){
  ctx.save();ctx.font='bold 33px ui-monospace,SF Mono,monospace';ctx.textAlign='center';ctx.textBaseline='bottom';
  const totalAngle=text.length*0.18,startAngle=-Math.PI/2-totalAngle/2;
  ctx.shadowColor='rgba(0,0,0,0.8)';ctx.shadowBlur=4;
  for(let i=0;i<text.length;i++){
    const angle=startAngle+(i+0.5)*0.22;
    ctx.save();ctx.translate(cx+r*Math.cos(angle),cy+r*Math.sin(angle));
    ctx.rotate(angle+Math.PI/2);ctx.fillText(text[i],0,0);ctx.restore();
  }
  ctx.restore();
}
// Score по нижнему полукругу r600 — буквы читаются снаружи окружности
function drawArcScore(ctx,text,cx,cy,r,col){
  ctx.save();
  ctx.font='bold 22px ui-monospace,SF Mono,monospace';
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillStyle=col;
  ctx.shadowColor='rgba(0,0,0,0.9)';ctx.shadowBlur=5;
  const charStep=0.20;
  const totalAngle=(text.length-1)*charStep;
  const startAngle=Math.PI/2+totalAngle/2;
  const rOut=r+6;
  for(let i=0;i<text.length;i++){
    const angle=startAngle-i*charStep;
    ctx.save();
    ctx.translate(cx+rOut*Math.cos(angle),cy+rOut*Math.sin(angle));
    ctx.rotate(angle-Math.PI/2);
    ctx.fillText(text[i],0,0);
    ctx.restore();
  }
  ctx.restore();
}

// Rec.709 luma из канальных гистограмм одного патча
function _lumaHist(patch){
  const hr=patch._hR,hg=patch._hG,hb=patch._hB;
  if(!hr)return null;
  const h=new Float32Array(256);
  for(let i=0;i<256;i++) h[i]=hr[i]*0.299+hg[i]*0.587+hb[i]*0.114;
  return h;
}
// Основная функция — принимает массив spots (до 3) или одиночный patch (drag-preview)
// Цвета спотов: серый/тёплый/тёмный
const HIST_COLORS=['rgba(200,200,200,0.9)','rgba(255,220,100,0.85)','rgba(120,140,200,0.85)'];
function drawSpotHistogram(spotsOrPatch, canvasEl, scores){
  if(!canvasEl)return;
  const W=CONFIG.HIST.SPOT_W,H=CONFIG.HIST.SPOT_H;
  const ctx=canvasEl.getContext('2d');
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#16161c';ctx.fillRect(0,0,W,H);
  // Вертикальные пунктиры: чёрный/серый/белый норма
  [[20,'rgba(255,255,255,0.2)'],[127,'rgba(255,255,255,0.35)'],[230,'rgba(255,255,255,0.2)']].forEach(([v,c])=>{
    const x=Math.round(v/255*(W-1));
    ctx.strokeStyle=c;ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();
  });
  ctx.setLineDash([]);
  // Определяем список патчей для рисования
  let patches,colors;
  if(Array.isArray(spotsOrPatch)){
    patches=spotsOrPatch.map((sp,i)=>({h:sp?_lumaHist(sp.patchLarge):null,col:HIST_COLORS[i]})).filter(p=>p.h);
  } else {
    // одиночный patch (drag preview) — серый
    const h=_lumaHist(spotsOrPatch);
    patches=h?[{h,col:'rgba(180,180,180,0.85)'}]:[];
  }
  if(!patches.length){ctx.setLineDash([]);canvasEl.style.display='block';return;}

  // Peak: комбинация Б (count threshold) + А (percentile clip)
  // Шаг 1 (Б): считаем total пикселей по всем патчам, порог = max(3, total*0.001)
  // Бины ниже порога не участвуют в поиске peak — JPEG артефакты (1-5 пикс) не влияют
  // Шаг 2 (А): из оставшихся значимых баров берём 98-й перцентиль как peak
  // — защита от пересвеченной белой карты где много пикселей в бине 255
  // Бары выше peak клипуются на высоту canvas — видны как столбик у края
  let totalCount=0;
  patches.forEach(({h})=>{for(let i=0;i<256;i++)totalCount+=h[i];});
  const binThreshold=Math.max(3, totalCount*0.001);

  // Собрать все значимые значения баров для percentile
  const sigVals=[];
  patches.forEach(({h})=>{
    for(let i=0;i<256;i++) if(h[i]>=binThreshold) sigVals.push(h[i]);
  });
  if(!sigVals.length){canvasEl.style.display='block';return;}
  sigVals.sort((a,b)=>a-b);
  const peak=sigVals[Math.floor(sigVals.length*0.98)]||sigVals[sigVals.length-1];
  if(!peak){canvasEl.style.display='block';return;}

  const bw=Math.max(1,Math.round(W/256)+1);
  patches.forEach(({h,col})=>{
    ctx.fillStyle=col;
    for(let i=0;i<256;i++){
      const x=Math.round(i/255*(W-1));
      const bH=Math.min(H-2, Math.round(h[i]/peak*(H-4))); // клип: выше peak → до края
      if(bH>0)ctx.fillRect(x,H-bH,bw,bH);
    }
  });
  // Score overlay: верхний правый угол — общая оценка сцены 600/250
  if(scores&&scores.s600!=null){
    const s6=Math.round(scores.s600);
    const s2=scores.s250!=null?Math.round(scores.s250):null;
    const txt=s2!=null?`${s6}/${s2}`:String(s6);
    ctx.font='bold 20px ui-monospace,SF Mono,monospace';
    const tw=ctx.measureText(txt).width;
    const clr=s6>=CONFIG.SCORE.OK?'#6ec96e':s6>=CONFIG.SCORE.WARN?'#e8a020':'#e05050';
    ctx.shadowColor='rgba(0,0,0,0.95)';ctx.shadowBlur=6;
    ctx.fillStyle=clr;
    ctx.textBaseline='top';
    ctx.fillText(txt,W-tw-4,2);
    ctx.shadowBlur=0;
  }
  canvasEl.style.display='block';
}

// ── v1.2-D вариант А: Cr/Cb диаграмма — планкианская кривая + skin locus + точка спота ──
// Canvas 150×150px. Cr = ось X (Blue←→Amber), Cb = ось Y (Magenta←→Green).
// Планкианская кривая: Temperature_to_RGB → ycbcr() — использует существующие функции.
// Skin locus: broadcast константа BT.601, угол ~123° (FUTURE §v1.2-D).
const _SKIN_LOCUS={cr_center:0.15,cb_center:0.03,width:0.06,angle_deg:123};
// Кэш кривой — строится один раз
let _planckCache=null;
function _buildPlanckianLocus(){
  if(_planckCache)return _planckCache;
  const pts=[];
  for(let T=2000;T<=10000;T+=150){
    const[r,g,b]=Temperature_to_RGB(T);
    const{Cb,Cr}=ycbcr(r,g,b);
    pts.push({T,dCr:Cr-128,dCb:Cb-128});
  }
  _planckCache=pts;
  return pts;
}
function drawYCbCrDiag(canvasEl, spots, T_exact, frameData){
  if(!canvasEl)return;
  const W=canvasEl.width, H=canvasEl.height;
  const ctx=canvasEl.getContext('2d');
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0d0d12';
  ctx.fillRect(0,0,W,H);

  // Автомасштаб вариант В: RANGE по реальному разбросу данных.
  // Планкиан рисуется полностью — clip rect обрезает за края.
  let _spread=7;
  const _pts=[];
  spots.forEach(s=>{
    if(s&&s.patchLarge){const{Cb,Cr}=ycbcr(s.patchLarge.medR,s.patchLarge.medG,s.patchLarge.medB);
      _pts.push(Math.abs(Cr-128),Math.abs(Cb-128));}
  });
  if(frameData&&frameData.medR!==undefined){
    const{Cb,Cr}=ycbcr(frameData.medR,frameData.medG,frameData.medB);
    _pts.push(Math.abs(Cr-128),Math.abs(Cb-128));
  }
  if(_pts.length)_spread=Math.max(7,Math.max(..._pts)*1.7);
  const RANGE=Math.min(42,Math.round(_spread));
  // Шаг сетки по масштабу
  const _gStep=RANGE<=8?2:RANGE<=18?5:10;
  // Преобразование dCr/dCb → пиксели (центр = W/2, H/2)
  const toX=dCr=>(W/2)+(dCr/RANGE)*(W/2-8);
  const toY=dCb=>(H/2)-(dCb/RANGE)*(H/2-8); // Y инвертирован: Cb+ = Green = вверх

  // Clip rect — планкиан не вылезает за рамку
  ctx.save();ctx.beginPath();ctx.rect(0,0,W,H);ctx.clip();

  // Сетка
  ctx.strokeStyle='rgba(255,255,255,0.07)';ctx.lineWidth=0.5;
  for(let d=-RANGE*3;d<=RANGE*3;d+=_gStep){
    ctx.beginPath();ctx.moveTo(toX(d),4);ctx.lineTo(toX(d),H-4);ctx.stroke();
    ctx.beginPath();ctx.moveTo(4,toY(d));ctx.lineTo(W-4,toY(d));ctx.stroke();
  }

  // Оси
  ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(toX(0),4);ctx.lineTo(toX(0),H-4);ctx.stroke();
  ctx.beginPath();ctx.moveTo(4,toY(0));ctx.lineTo(W-4,toY(0));ctx.stroke();

  // Подписи осей
  // Режим: споты или кадр
  ctx.font='7px ui-monospace,monospace';ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.textAlign='left';
  ctx.fillText((typeof _ycbcrMode!=='undefined'&&_ycbcrMode==='frame'?'⊞ кадр':'● споты')+' ±'+Math.round(RANGE), 3, 8);
  ctx.textAlign='center';
  ctx.fillText('G+',W/2,7);
  ctx.fillText('M+',W/2,H-1);
  ctx.textAlign='left';
  ctx.fillText('B+',2,H/2-2);
  ctx.textAlign='right';
  ctx.fillText('A+',W-2,H/2-2);

  // Планкианская кривая
  const locus=_buildPlanckianLocus();
  ctx.strokeStyle='rgba(180,180,255,0.55)';ctx.lineWidth=1.5;
  ctx.beginPath();
  locus.forEach((p,i)=>{
    const x=toX(p.dCr),y=toY(p.dCb);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.stroke();
  // Метки температур на кривой
  ctx.font='6px ui-monospace,monospace';ctx.fillStyle='rgba(180,180,255,0.5)';
  [3200,5500,8000].forEach(T=>{
    const p=locus.find(p=>Math.abs(p.T-T)<200);
    if(p){ctx.textAlign='left';ctx.fillText(T+'K',toX(p.dCr)+3,toY(p.dCb)-2);}
  });

  // Skin locus — полоса ~123° от оси Cr (BT.601 broadcast константа)
  const sk=_SKIN_LOCUS;
  const ang=sk.angle_deg*Math.PI/180;
  const len=RANGE*0.7, hw=sk.width*RANGE;
  const cx0=sk.cr_center*RANGE, cy0=sk.cb_center*RANGE;
  const dx=Math.cos(ang)*len, dy=Math.sin(ang)*len;
  const nx=-Math.sin(ang)*hw, ny=Math.cos(ang)*hw;
  ctx.strokeStyle='rgba(255,180,100,0.45)';ctx.lineWidth=hw*W/RANGE/2;
  ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(toX(cx0-dx/2),toY(cy0-dy/2));
  ctx.lineTo(toX(cx0+dx/2),toY(cy0+dy/2));
  ctx.stroke();
  ctx.lineCap='butt';
  ctx.font='6px ui-monospace,monospace';
  ctx.fillStyle='rgba(255,180,100,0.6)';
  ctx.textAlign='left';
  ctx.fillText('skin',toX(cx0+dx/2)+2,toY(cy0+dy/2)+3);

  // Точка(и) спота — серый/белый/чёрный
  const spotColors=['rgba(200,200,200,0.95)','rgba(255,255,180,0.9)','rgba(100,120,160,0.8)'];
  if(spots){
    spots.forEach((sp,si)=>{
      if(!sp||!sp.patchLarge)return;
      const{Cb,Cr}=ycbcr(sp.patchLarge.medR,sp.patchLarge.medG,sp.patchLarge.medB);
      const dCr=Cr-128,dCb=Cb-128;
      const x=toX(dCr),y=toY(dCb);
      // Тень
      ctx.beginPath();ctx.arc(x,y,5,0,2*Math.PI);
      ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fill();
      // Точка
      ctx.beginPath();ctx.arc(x,y,4,0,2*Math.PI);
      ctx.fillStyle=spotColors[si]||'#fff';ctx.fill();
      // Метка
      if(si===0){
        ctx.font='bold 7px ui-monospace,monospace';
        ctx.fillStyle='#fff';ctx.textAlign='left';
        ctx.fillText(`${dCr>=0?'+':''}${dCr.toFixed(0)}/${dCb>=0?'+':''}${dCb.toFixed(0)}`,x+6,y+3);
      }
    });
  }

  // Точка кадра — серая маленькая (если есть frameData)
  if(frameData&&frameData.medR!==undefined){
    const{Cb:fCb,Cr:fCr}=ycbcr(frameData.medR,frameData.medG,frameData.medB);
    const fdCr=fCr-128,fdCb=fCb-128;
    const fx=toX(fdCr),fy=toY(fdCb);
    ctx.beginPath();ctx.arc(fx,fy,3,0,2*Math.PI);
    ctx.fillStyle='rgba(160,160,160,0.5)';ctx.fill();
    ctx.font='6px ui-monospace,monospace';ctx.fillStyle='rgba(160,160,160,0.45)';
    ctx.textAlign='left';ctx.fillText('frm',fx+5,fy+3);
  }
  // Нейтральная точка — перекрестие
  ctx.strokeStyle='rgba(80,220,80,0.6)';ctx.lineWidth=1;
  const ox=toX(0),oy=toY(0);
  ctx.beginPath();ctx.moveTo(ox-5,oy);ctx.lineTo(ox+5,oy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(ox,oy-5);ctx.lineTo(ox,oy+5);ctx.stroke();
  ctx.restore(); // конец clip (автомасштаб)
}

function drawFrameHistogramOnCanvas(hR,hG,hB,total,targetCanvas){
  const src=drawFrameHistogram(hR,hG,hB,total);
  const ctx=targetCanvas.getContext('2d');

  ctx.drawImage(src,0,0,targetCanvas.width,targetCanvas.height);
}
function drawFrameHistogram(hR,hG,hB,total){
  const W=500,H=80;
  const c=document.createElement('canvas');c.width=W;c.height=H;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#16161c';ctx.fillRect(0,0,W,H);
  // Peak только из рабочей зоны 16-239 — края не влияют на масштаб
  // Бины 0-15 (чёрная карта) и 240-255 (пересвет) рисуются но не масштабируют
  let peak=0;
  for(let i=16;i<CONFIG.HIST.CLIP_ZONE;i++){
    if(hR[i]>peak)peak=hR[i];
    if(hG[i]>peak)peak=hG[i];
    if(hB[i]>peak)peak=hB[i];
  }
  if(!peak) for(let i=0;i<256;i++){if(hR[i]>peak)peak=hR[i];if(hG[i]>peak)peak=hG[i];if(hB[i]>peak)peak=hB[i];}
  if(!peak)return c;
  const cols=[['rgba(224,80,80,0.7)',hR],['rgba(62,207,106,0.7)',hG],['rgba(74,143,232,0.7)',hB]];
  cols.forEach(([col,h])=>{
    ctx.beginPath();ctx.fillStyle=col;
    for(let i=0;i<256;i++){
      const x=Math.round(i/255*(W-1));
      const barH=Math.round(h[i]/peak*(H-2));
      ctx.fillRect(x,H-barH,Math.max(1,Math.round(W/256)),barH);
    }
  });
  // axis line
  ctx.strokeStyle='#252530';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,H-1);ctx.lineTo(W,H-1);ctx.stroke();
  return c;
}

// ═══════════════════════════════════════════════════
// buildIntegralImage: один проход по disp canvas
// sR/sG/sB — Uint32Array (max disp sum ~245M << Uint32 max 4.29B, экономия ~11MB vs Float64)
// sR2/sG2/sB2 — Float64Array (r*r до 65025, sum до 93B > Uint32 max)
function buildIntegralImage(canvas){
  const W=canvas.width,H=canvas.height;
  const _t0=performance.now();
  const data=canvas.getContext('2d').getImageData(0,0,W,H).data;
  const stride=W+1;
  const sR=new Uint32Array(stride*(H+1)),sG=new Uint32Array(stride*(H+1)),
        sB=new Uint32Array(stride*(H+1)),sR2=new Float64Array(stride*(H+1)),
        sG2=new Float64Array(stride*(H+1)),sB2=new Float64Array(stride*(H+1)),
        sCr=new Float32Array(stride*(H+1)),sCb=new Float32Array(stride*(H+1));
  for(let y=1;y<=H;y++){
    for(let x=1;x<=W;x++){
      const pi=((y-1)*W+(x-1))*4;
      const r=data[pi],g=data[pi+1],b=data[pi+2];
      const i=y*stride+x;
      sR[i]=r+sR[i-1]+sR[i-stride]-sR[i-stride-1];
      sG[i]=g+sG[i-1]+sG[i-stride]-sG[i-stride-1];
      sB[i]=b+sB[i-1]+sB[i-stride]-sB[i-stride-1];
      sR2[i]=r*r+sR2[i-1]+sR2[i-stride]-sR2[i-stride-1];
      sG2[i]=g*g+sG2[i-1]+sG2[i-stride]-sG2[i-stride-1];
      sB2[i]=b*b+sB2[i-1]+sB2[i-stride]-sB2[i-stride-1];
      // Cr/Cb для динамического порога суперспота (YCbCr BT.601)
      const cr=0.5*r-0.418688*g-0.081312*b; // Cr−128 (без +128 для нулевого центра)
      const cb=-0.168736*r-0.331264*g+0.5*b; // Cb−128
      sCr[i]=cr+sCr[i-1]+sCr[i-stride]-sCr[i-stride-1];
      sCb[i]=cb+sCb[i-1]+sCb[i-stride]-sCb[i-stride-1];
    }
  }
  dbgLog('buildII '+W+'×'+H+' '+(performance.now()-_t0).toFixed(0)+'ms '+(8*(W+1)*(H+1)*4/1024/1024).toFixed(0)+'MB');
  return{sR,sG,sB,sR2,sG2,sB2,sCr,sCb,W,H,stride};
}
// iiRect: среднее и sigma по каналу для прямоугольника (x0,y0)-(x1,y1)
function iiRect(s,s2,stride,x0,y0,x1,y1){
  const n=(x1-x0)*(y1-y0);if(!n)return{mean:0,sigma:0};
  const sum=s[y1*stride+x1]-s[y0*stride+x1]-s[y1*stride+x0]+s[y0*stride+x0];
  const sum2=s2[y1*stride+x1]-s2[y0*stride+x1]-s2[y1*stride+x0]+s2[y0*stride+x0];
  const mean=sum/n;
  const sigma=Math.sqrt(Math.max(0,sum2/n-mean*mean));
  return{mean,sigma};
}
// ── N8: detectLightingGradient — детектор неравномерного освещения через II (MATH_SPEC §17.5) ──
// Сравнивает mean яркости левой vs правой половины + верхней vs нижней.
// Использует sG (зелёный канал — наиболее нейтральный для яркости).
function detectLightingGradient(ii){
  if(!ii)return null;
  const{W,H,stride,sG}=ii;
  const mL=iiRect(sG,sG,stride,0,0,Math.floor(W/2),H).mean;
  const mR=iiRect(sG,sG,stride,Math.floor(W/2),0,W,H).mean;
  const mT=iiRect(sG,sG,stride,0,0,W,Math.floor(H/2)).mean;
  const mB=iiRect(sG,sG,stride,0,Math.floor(H/2),W,H).mean;
  const dLR=Math.abs(mL-mR), dTB=Math.abs(mT-mB);
  const maxDelta=Math.max(dLR,dTB);
  const dir=maxDelta===dLR?(mL>mR?'лево':'право'):(mT>mB?'верх':'низ');
  return{dLR:Math.round(dLR),dTB:Math.round(dTB),maxDelta:Math.round(maxDelta),dir,warn:maxDelta>20};
}

// ── v1.2-A findSuperSpot — WB по нейтральным пикселям кадра ──
// v1.2-E: динамический порог через sCr/sCb из II; белый суперспот = топ 15% по Y
function findSuperSpot(canvas, ii){
  const{THR,MIN_PX}=CONFIG.SUPER;
  const W=canvas.width,H=canvas.height;
  const data=canvas.getContext('2d').getImageData(0,0,W,H).data;
  const total=W*H;
  // ── Динамический порог ──
  let dynTHR=THR;
  if(ii&&ii.sCr&&total>0){
    const stride=ii.stride;
    const meanCr=Math.abs(ii.sCr[H*stride+W]/total)/128;
    const meanCb=Math.abs(ii.sCb[H*stride+W]/total)/128;
    dynTHR=Math.min(THR*2, THR+Math.max(meanCr,meanCb)*0.5);
  }
  const temps=[];
  const pixR=[],pixG=[],pixB=[],pixY=[];
  let sumR=0,sumG=0,sumB=0;
  for(let i=0;i<data.length;i+=4){
    const R=data[i],G=data[i+1],B=data[i+2];
    const Y=(R+G+B)/3;
    if(Y<15||Y>240)continue;
    if(Math.abs(R-G)/Y<dynTHR&&Math.abs(B-G)/Y<dynTHR){
      const wb=calcWB(R,G,B,false);
      if(wb.T_exact>CONFIG.WB.TEMP_MIN&&wb.T_exact<CONFIG.WB.TEMP_MAX){
        temps.push(wb.T_exact);sumR+=R;sumG+=G;sumB+=B;
        pixR.push(R);pixG.push(G);pixB.push(B);pixY.push(Y);
      }
    }
  }
  const count=temps.length;
  if(count<MIN_PX){dbgLog(`superSpot: мало пикселей ${count}<${MIN_PX} dynTHR=${dynTHR.toFixed(3)}`);return{count,valid:false,dynTHR:Math.round(dynTHR*1000)/1000};}
  temps.sort((a,b)=>a-b);
  const T_super=temps[Math.floor(count/2)];
  const mean=temps.reduce((s,v)=>s+v,0)/count;
  const sigma_T=Math.round(Math.sqrt(temps.reduce((s,v)=>s+(v-mean)**2,0)/count));
  const medR=Math.round(sumR/count),medG=Math.round(sumG/count),medB=Math.round(sumB/count);
  // σ нормирован на яркость: R/Y — для сравнимости со спотом 600
  const varR=pixR.reduce((s,v,i)=>s+(v/(pixY[i]||1)-1.0)**2,0)/count;
  const varG=pixG.reduce((s,v,i)=>s+(v/(pixY[i]||1)-1.0)**2,0)/count;
  const varB=pixB.reduce((s,v,i)=>s+(v/(pixY[i]||1)-1.0)**2,0)/count;
  const sigR=Math.round(Math.sqrt(Math.max(0,varR))*255*10)/10;
  const sigG=Math.round(Math.sqrt(Math.max(0,varG))*255*10)/10;
  const sigB=Math.round(Math.sqrt(Math.max(0,varB))*255*10)/10;
  // RGB trim через гистограмму (один проход, pixR/G/B ещё в памяти)
  const hssR=new Int32Array(256),hssG=new Int32Array(256),hssB=new Int32Array(256);
  for(let j=0;j<count;j++){hssR[pixR[j]]++;hssG[pixG[j]]++;hssB[pixB[j]]++;}
  const trimR=Math.round(histTrimmedMean(hssR,count));
  const trimG=Math.round(histTrimmedMean(hssG,count));
  const trimB=Math.round(histTrimmedMean(hssB,count));
  // Y-гистограмма по 5 бинам (0-50,50-100,100-150,150-200,200-255) для диагностики
  const yBins=[0,0,0,0,0];
  for(let j=0;j<count;j++) yBins[Math.min(4,Math.floor(pixY[j]/50))]++;
  const wb=calcWB(medR,medG,medB,false);
  // ── Белый суперспот — топ 15% по Y ──
  const WHITE_MIN_PX=200;
  let whiteSuper=null;
  const sortedY=[...pixY].sort((a,b)=>b-a);
  const whiteCut=sortedY[Math.floor(count*0.15)]||0;
  const wT=[],wR=[0],wG=[0],wB=[0],wN=[0];
  for(let j=0;j<count;j++){
    if(pixY[j]>=whiteCut){
      const wbw=calcWB(pixR[j],pixG[j],pixB[j],false);
      wT.push(wbw.T_exact);wR[0]+=pixR[j];wG[0]+=pixG[j];wB[0]+=pixB[j];wN[0]++;
    }
  }
  if(wN[0]>=WHITE_MIN_PX){
    wT.sort((a,b)=>a-b);
    const wc=wN[0];
    const wMed=wT[Math.floor(wc/2)];
    const wMean=wT.reduce((s,v)=>s+v,0)/wc;
    const wSigT=Math.round(Math.sqrt(wT.reduce((s,v)=>s+(v-wMean)**2,0)/wc));
    const wmR=Math.round(wR[0]/wc),wmG=Math.round(wG[0]/wc),wmB=Math.round(wB[0]/wc);
    const wwb=calcWB(wmR,wmG,wmB,false);
    const greyTb=Math.round(wb.T_exact/100)*100;
    whiteSuper={count:wc,T_base:wwb.T_base,T_exact:wwb.T_exact,
                sigma_T:wSigT,medR:wmR,medG:wmG,medB:wmB,
                deltaK:wwb.T_base-greyTb};
  }
  dbgLog(`superSpot: count=${count} T=${Math.round(T_super)}K σT=${sigma_T}K dynTHR=${dynTHR.toFixed(3)}`+(whiteSuper?` white=${whiteSuper.T_base}K Δ${whiteSuper.deltaK}K`:''));
  return{count,valid:true,dynTHR:Math.round(dynTHR*1000)/1000,
         T_super:Math.round(T_super),sigma_T,sigR,sigG,sigB,medR,medG,medB,
         trimR,trimG,trimB,yBins,
         T_exact:wb.T_exact,T_base:wb.T_base,T_remainder:wb.T_remainder,green:wb.green,
         stepsGM:wb.stepsGM,stepsGM_int:wb.stepsGM_int,
         stepsBA:wb.stepsBA,stepsBA_int:wb.stepsBA_int,
         whiteSuper};
}
function calcSpotScore(patch,type){
  const cfg=CONFIG.AUTO[type.toUpperCase()];
  if(!cfg||!patch||!patch.count)return 0;
  const[tR,tG,tB]=cfg.target;
  const dist=(Math.abs(patch.medR-tR)+Math.abs(patch.medG-tG)+Math.abs(patch.medB-tB))/3;
  const avgSigma=(patch.sigmaR+patch.sigmaG+patch.sigmaB)/3;
  const distScore=Math.max(0,100-dist*2.5);
  const noiseScore=Math.max(0,100-avgSigma*4);
  return Math.round(distScore*0.7+noiseScore*0.3);
}
// findAutoSpot: sliding window через II, возвращает {cx,cy} в disp-координатах
function findAutoSpot(ii,disp,type,norm,scaleND){
  const{W,H,stride,sR,sG,sB,sR2,sG2,sB2}=ii;
  const cfg=CONFIG.AUTO[type.toUpperCase()];
  const rl=Math.round(CONFIG.PATCH.R_LARGE/scaleND); // радиус в disp
  const step=Math.max(4,Math.round(rl/CONFIG.AUTO.STEP_DIV));
  const M=Math.ceil(CONFIG.PATCH.MARGIN/scaleND); // Б2.3: унифицировано с _dragMove
  let bestScore=-1,bestCx=Math.round(W/2),bestCy=Math.round(H/2);
  for(let cy=M;cy<=H-M;cy+=step){
    for(let cx=M;cx<=W-M;cx+=step){
      const x0=cx-rl,y0=cy-rl,x1=cx+rl,y1=cy+rl;
      const qR=iiRect(sR,sR2,stride,x0,y0,x1,y1);
      const qG=iiRect(sG,sG2,stride,x0,y0,x1,y1);
      const qB=iiRect(sB,sB2,stride,x0,y0,x1,y1);
      const lum=(qR.mean+qG.mean+qB.mean)/3;
      if(lum<cfg.lumMin||lum>cfg.lumMax)continue;
      const[tR,tG,tB]=cfg.target;
      const dist=(Math.abs(qR.mean-tR)+Math.abs(qG.mean-tG)+Math.abs(qB.mean-tB))/3;
      const avgSigma=(qR.sigma+qG.sigma+qB.sigma)/3;
      const sc=Math.max(0,100-dist*2.5)*0.7+Math.max(0,100-avgSigma*4)*0.3;
      if(sc>bestScore){bestScore=sc;bestCx=cx;bestCy=cy;}
    }
  }
  return{cx:bestCx,cy:bestCy};
}

function fK(wb){return`<span class="vK">${wb.T_base}K</span><span class="vR"> ~${Math.round(wb.T_exact)}K Δ${wb.T_remainder>=0?'+':''}${Math.round(wb.T_remainder)}K</span>`;}
function fGM(wb){const s=wb.stepsGM,si=wb.stepsGM_int,cls=si>0?'vM':si<0?'vG':'vN',lbl=si>0?`M+${si}`:si<0?`G+${-si}`:'M/G 0';return`<span class="${cls}">${lbl}</span><span class="vR"> (${s>=0?'+':''}${s.toFixed(2)})</span>`;}
function fBA(wb){const si=wb.stepsBA_int,lbl=si>0?`A+${si}`:si<0?`B+${-si}`:'B/A 0';const clr=si===0?'var(--muted)':si>0?'var(--amber)':'var(--blue)';return`<span style="color:${clr};font-weight:bold">${lbl}</span><span class="vR"> (${wb.stepsBA>=0?'+':''}${wb.stepsBA.toFixed(2)})</span>`;}
function fRGB(r,g,b){return`<span class="rR">${r}</span>/<span class="rG">${g}</span>/<span class="rB">${b}</span>`;}
// YCbCr диагностика: Cb=128→нейтраль (хол/тепл), Cr=128→нейтраль (зел/пур)
// fYCbCrVariant: какой будет YCbCr патча если применить WB для T_alt
// Симулирует: patch * (WBgain_T_alt / WBgain_T_exact) → YCbCr
function fYCbCrVariant(patch,T_exact,T_alt){
  const rRef=Temperature_to_RGB(T_exact), rAlt=Temperature_to_RGB(T_alt);
  // Коэффициенты коррекции относительно G-канала (||1e-9 — защита от деления на 0 на краях спектра)
  const gR=(rRef[1]/(rRef[0]||1e-9))/(rAlt[1]/(rAlt[0]||1e-9));
  const gB=(rRef[1]/(rRef[2]||1e-9))/(rAlt[1]/(rAlt[2]||1e-9));
  const R=Math.max(0,Math.min(255,patch.medR*gR));
  const G=patch.medG;
  const B=Math.max(0,Math.min(255,patch.medB*gB));
  const{Cb,Cr}=ycbcr(R,G,B);
  const dCb=Cb-128,dCr=Cr-128;
  const crClr=dCr>0?'var(--amber)':dCr<0?'var(--blue)':'var(--muted)'; // UI.3: без порога
  const cbClr=dCb>0?'var(--green)':dCb<0?'var(--magenta)':'var(--muted)';
  return`Cb<span style="color:${cbClr}">${dCb>=0?'+':''}${dCb.toFixed(1)}</span>`+
    ` Cr<span style="color:${crClr}">${dCr>=0?'+':''}${dCr.toFixed(1)}</span>`;
}
function ycbcr(R,G,B){
  return{
    Cb:128-37.79*R/255-74.49*G/255+112.44*B/255,
    Cr:128+112.44*R/255-93.77*G/255-18.21*B/255
  };
}
// YCbCr цвета: Cr=температурная ось (Cr+→amber/тепло, Cr-→blue/холод)
//              Cb=тинт-ось (Cb+→green, Cb-→magenta). Порог убран (UI.3) — красить по знаку.
function fYCbCr(patch){
  const{Cb,Cr}=ycbcr(patch.medR,patch.medG,patch.medB);
  const dCb=Cb-128,dCr=Cr-128;
  const crClr=dCr>0?'var(--amber)':dCr<0?'var(--blue)':'var(--muted)';
  const cbClr=dCb>0?'var(--green)':dCb<0?'var(--magenta)':'var(--muted)';
  return`Cb<span style="color:${cbClr}">${dCb>=0?'+':''}${dCb.toFixed(1)}</span> `+
    `Cr<span style="color:${crClr}">${dCr>=0?'+':''}${dCr.toFixed(1)}</span>`;
}
function fBAval(T_exact,T_alt){const{stepsBA_int:v}=calcStepsBA(T_exact,T_alt);const lbl=v>0?`A+${v}`:v<0?`B+${-v}`:'B/A 0';const clr=v===0?'var(--muted)':v>0?'var(--amber)':'var(--blue)';return`<span style="color:${clr};font-weight:bold">${lbl}</span>`;}
function noiseVal(p){return Math.max(p.sigmaR,p.sigmaG,p.sigmaB)/255*100;}
function noiseClr(n){return n>10?'var(--red)':n>3?'var(--amber)':'var(--muted)';}

// ── M1: calcSigma — Σ=dCr+dCb (MATH_SPEC §16.3) ──
// Σ>0 пурпур (M), Σ<0 зелень (G). Ось T (тепло/холод) ортогональна Σ.
function calcSigma(R,G,B){
  const{Cb,Cr}=ycbcr(R,G,B);
  return (Cr-128)+(Cb-128);
}
// ── M1b: calcDist — евклидова норма в YCbCr (fix Б-SIGMA) ──
// Используется для минимизации, порогов, N-шагов — не даёт ложный нуль при взаимной компенсации Cr/Cb
function calcDist(R,G,B){
  const{Cb,Cr}=ycbcr(R,G,B);
  return Math.sqrt((Cr-128)*(Cr-128)+(Cb-128)*(Cb-128));
}

// ── M1: simRGB — симуляция RGB при смене K (MATH_SPEC §16.3) ──
// Gain через Temperature_to_RGB; G-канал не меняется
function simRGB(R,G,B,T_exact,T_alt){
  const rRef=Temperature_to_RGB(T_exact),rAlt=Temperature_to_RGB(T_alt);
  const gR=(rRef[1]/(rRef[0]||1e-9))/(rAlt[1]/(rAlt[0]||1e-9));
  const gB=(rRef[1]/(rRef[2]||1e-9))/(rAlt[1]/(rAlt[2]||1e-9));
  return[Math.max(0,Math.min(255,R*gR)),G,Math.max(0,Math.min(255,B*gB))];
}

// ── M2: calcYCbCrOpt — рекурсивная оптимизация T по Σ (MATH_SPEC §16.2) ──
const YCBCR_OPT={SIGMA_THRESHOLD:12,SCAN_RANGE:700,MAX_ITER:6,MIN_IMPROVEMENT:0.5,MAX_DELTA:1500};
function calcYCbCrOpt(medR,medG,medB,T_exact){
  const T_base=Math.round(T_exact/100)*100;
  const s0=calcSigma(medR,medG,medB);          // знаковая — для отображения
  const d0=calcDist(medR,medG,medB);            // евклидова — для порога (fix Б-SIGMA)
  if(d0>YCBCR_OPT.SIGMA_THRESHOLD)return{skip:true,sigma0:s0};
  let curR=medR,curG=medG,curB=medB,Te_cur=T_exact;
  let bestT=T_base,bestAbs=d0;
  for(let i=0;i<YCBCR_OPT.MAX_ITER;i++){
    const Tb_cur=Math.round(Te_cur/100)*100;
    let T_opt=Tb_cur,sMin=calcDist(curR,curG,curB); // евклидова минимизация
    for(let dT=-YCBCR_OPT.SCAN_RANGE;dT<=YCBCR_OPT.SCAN_RANGE;dT+=100){
      const T_test=Tb_cur+dT;
      if(T_test<CONFIG.WB.TEMP_MIN||T_test>CONFIG.WB.TEMP_MAX)continue;
      const[R2,,B2]=simRGB(curR,curG,curB,Te_cur,T_test);
      const st=calcDist(R2,curG,B2);              // евклидова минимизация
      if(st<sMin){sMin=st;T_opt=T_test;}
    }
    if(T_opt===Tb_cur||sMin>=bestAbs-YCBCR_OPT.MIN_IMPROVEMENT)break;
    [curR,curG,curB]=simRGB(curR,curG,curB,Te_cur,T_opt);
    Te_cur=T_opt;bestT=T_opt;bestAbs=sMin;
  }
  const delta=bestT-T_base;
  return{skip:false,sigma0:s0,T_ycbcr:bestT,sigma_f:calcSigma(curR,curG,curB),delta,reliable:Math.abs(delta)<=YCBCR_OPT.MAX_DELTA};
}

// calcDiagData: pure computation — no DOM, no HTML
// Returns all derived values for renderDiag and exportReport
// calcSceneScore: общий score сцены по 1-3 спотам (MATH_SPEC §18)
function calcSceneScore(spots){
  const active=spots.filter(s=>s&&s.score!=null);
  if(!active.length)return 0;
  const avgSpot=active.reduce((s,p)=>s+p.score,0)/active.length;
  if(active.length<2)return Math.round(avgSpot);
  const Ks=active.map(s=>s.patchLarge?calcWB(s.patchLarge.medR,s.patchLarge.medG,s.patchLarge.medB,false).T_exact:0).filter(k=>k>0);
  if(Ks.length<2)return Math.round(avgSpot);
  const deltaK=Math.max(...Ks)-Math.min(...Ks);
  const consistency=Math.max(0,100-deltaK/8);
  return Math.round(avgSpot*0.8+consistency*0.2);
}
// calcSceneScore250: то же по score250 (патч 250px)
function calcSceneScore250(spots){
  const active=spots.filter(s=>s&&s.score250!=null);
  if(!active.length)return null;
  const avgSpot=active.reduce((s,p)=>s+p.score250,0)/active.length;
  if(active.length<2)return Math.round(avgSpot);
  const Ks=active.map(s=>s.patchSmall?calcWB(s.patchSmall.medR,s.patchSmall.medG,s.patchSmall.medB,false).T_exact:0).filter(k=>k>0);
  if(Ks.length<2)return Math.round(avgSpot);
  const deltaK=Math.max(...Ks)-Math.min(...Ks);
  const consistency=Math.max(0,100-deltaK/8);
  return Math.round(avgSpot*0.8+consistency*0.2);
}
// sceneScores: хелпер — возвращает {s600, s250} для передачи в drawSpotHistogram
function sceneScores(spots){
  return{s600:calcSceneScore(spots),s250:calcSceneScore250(spots)};
}
function calcDiagData(spots,exif,tm,frameData){
  if(!spots[0])return {};
  if(!frameData)return {}; // C1.7: frameData null guard
  const patchSmall=spots[0].patchSmall,patchLarge=spots[0].patchLarge;

  const allWarns=[];
  const baShift=(exif&&exif.make==='Canon')?(exif.wbShiftBA||0):0;
  if(exif&&exif.make==='Canon'){
    const shiftParts=[];
    if(exif.wbShiftBA!==null&&exif.wbShiftBA!==0){
      const lbl=exif.wbShiftBA>0?`A+${exif.wbShiftBA}`:`B+${-exif.wbShiftBA}`;
      shiftParts.push(`B/A: ${lbl}`);
    }
    if(exif.wbShiftMG!==null&&exif.wbShiftMG!==0){
      const lbl=exif.wbShiftMG>0?`G+${exif.wbShiftMG}`:`M+${-exif.wbShiftMG}`;
      shiftParts.push(`M/G: ${lbl}`);
    }
    if(shiftParts.length){
      const _notes=[baShift?'B/A учтён':'',
                   (exif.wbShiftMG&&exif.wbShiftMG!==0)?'M/G на T не влияет':'']
        .filter(Boolean).join(', ');
      allWarns.push(`ℹ сдвиг в EXIF: ${shiftParts.map(p=>p.replace(/^[BM]\/[AG]: /,'')).join(', ')}${_notes?' ('+_notes+')':''}`);
    }
  }
  allWarns.push(...getPatchWarnings(patchSmall.medR,patchSmall.medG,patchSmall.medB).map(w=>`250px ${w}`));
  allWarns.push(...getPatchWarnings(patchLarge.medR,patchLarge.medG,patchLarge.medB).map(w=>`600px ${w}`));

  const t0=performance.now();
  // N2: applyBACorr — корректируем T_exact на B/A сдвиг камеры для всех WB результатов
  // N1: σ-trim WB (mean±2σ из гистограммы патча)
  const jpegSigTrim250=applyBACorr(calcWB(patchSmall.sigTrimR,patchSmall.sigTrimG,patchSmall.sigTrimB,false),baShift);
  const linSigTrim250 =applyBACorr(calcWB(patchSmall.sigTrimR,patchSmall.sigTrimG,patchSmall.sigTrimB,true), baShift);
  const jpegSigTrim600=applyBACorr(calcWB(patchLarge.sigTrimR,patchLarge.sigTrimG,patchLarge.sigTrimB,false),baShift);
  const linSigTrim600 =applyBACorr(calcWB(patchLarge.sigTrimR,patchLarge.sigTrimG,patchLarge.sigTrimB,true), baShift);
  const jpegMed250=applyBACorr(calcWB(patchSmall.medR,patchSmall.medG,patchSmall.medB,false),baShift);
  const linMed250 =applyBACorr(calcWB(patchSmall.medR,patchSmall.medG,patchSmall.medB,true), baShift);
  const jpegMed600=applyBACorr(calcWB(patchLarge.medR,patchLarge.medG,patchLarge.medB,false),baShift);
  const linMed600 =applyBACorr(calcWB(patchLarge.medR,patchLarge.medG,patchLarge.medB,true), baShift);
  // Trimmed mean WB (5%-95%)
  const jpegTrim250=applyBACorr(calcWB(patchSmall.trimR,patchSmall.trimG,patchSmall.trimB,false),baShift);
  const linTrim250 =applyBACorr(calcWB(patchSmall.trimR,patchSmall.trimG,patchSmall.trimB,true), baShift);
  const jpegTrim600=applyBACorr(calcWB(patchLarge.trimR,patchLarge.trimG,patchLarge.trimB,false),baShift);
  const linTrim600 =applyBACorr(calcWB(patchLarge.trimR,patchLarge.trimG,patchLarge.trimB,true), baShift);
  if(jpegMed600.T_exact>15000)allWarns.push('⚠ выше 15000K — вне диапазона Canon');
  if(linMed600.T_exact>15000)allWarns.push('⚠ LIN выше 15000K');
  tm.calcWB=Math.round(performance.now()-t0);

  // N1: Δ |percentile-trim - σ-trim|
  const dSTR250=Math.abs(Math.round(jpegTrim250.T_exact)-Math.round(jpegSigTrim250.T_exact));
  const dSTL250=Math.abs(Math.round(linTrim250.T_exact) -Math.round(linSigTrim250.T_exact));
  const dSTR600=Math.abs(Math.round(jpegTrim600.T_exact)-Math.round(jpegSigTrim600.T_exact));
  const dSTL600=Math.abs(Math.round(linTrim600.T_exact) -Math.round(linSigTrim600.T_exact));
  const dZR=Math.abs(Math.round(jpegMed250.T_exact)-Math.round(jpegMed600.T_exact));
  const dZL=Math.abs(Math.round(linMed250.T_exact)-Math.round(linMed600.T_exact));
  // Δ |median_T - trim_T| — устойчивость к выбросам
  const dMMR250=Math.abs(Math.round(jpegMed250.T_exact)-Math.round(jpegTrim250.T_exact));
  const dMMR600=Math.abs(Math.round(jpegMed600.T_exact)-Math.round(jpegTrim600.T_exact));
  const dMML250=Math.abs(Math.round(linMed250.T_exact)-Math.round(linTrim250.T_exact));
  const dMML600=Math.abs(Math.round(linMed600.T_exact)-Math.round(linTrim600.T_exact));
  const n250=noiseVal(patchSmall),n600=noiseVal(patchLarge);

  const wbFrame=applyBACorr(calcWB(frameData.medR,frameData.medG,frameData.medB,false),baShift);
  const wbFrameLin=applyBACorr(calcWB(frameData.medR,frameData.medG,frameData.medB,true),baShift);
  const wbFrameTrim=applyBACorr(calcWB(frameData.trimR,frameData.trimG,frameData.trimB,false),baShift);
  const wbFrameTrimLin=applyBACorr(calcWB(frameData.trimR,frameData.trimG,frameData.trimB,true),baShift);
  const kr=patchLarge.medG/Math.max(patchLarge.medR,1);
  const kb=patchLarge.medG/Math.max(patchLarge.medB,1);

  const dMMRFrm=Math.abs(Math.round(wbFrame.T_exact)-Math.round(wbFrameTrim.T_exact));
  const dMMLFrm=Math.abs(Math.round(wbFrameLin.T_exact)-Math.round(wbFrameTrimLin.T_exact));
  const ycbcrOpt=calcYCbCrOpt(patchLarge.medR,patchLarge.medG,patchLarge.medB,jpegMed600.T_exact); // T_exact уже с N2 коррекцией
  // M3: Σ со знаком для 600px
  const sigma600=calcSigma(patchLarge.medR,patchLarge.medG,patchLarge.medB);
  const sigma250=calcSigma(patchSmall.medR,patchSmall.medG,patchSmall.medB);
  const sigmaFrm=frameData?calcSigma(frameData.medR,frameData.medG,frameData.medB):0;
  // sigmaAuto вычисляется в renderDiag где superSpot доступен как параметр

  // N8: детектор градиента освещения
  const gradient=detectLightingGradient(frameData&&frameData.ii?frameData.ii:null);
  if(gradient&&gradient.warn)
    allWarns.push(`⚠ неравномерный свет: ΔLR=${gradient.dLR} ΔTB=${gradient.dTB} — ярче ${gradient.dir}`);

  return{
    patchSmall,patchLarge,allWarns,
    jpegMed250,linMed250,jpegMed600,linMed600,
    dZR,dZL,dMMR250,dMMR600,dMML250,dMML600,dMMRFrm,dMMLFrm,
    jpegTrim250,linTrim250,jpegTrim600,linTrim600,
    jpegSigTrim250,linSigTrim250,jpegSigTrim600,linSigTrim600,
    dSTR250,dSTL250,dSTR600,dSTL600,
    n250,n600,wbFrame,wbFrameLin,wbFrameTrim,wbFrameTrimLin,kr,kb,
    ycbcrOpt,sigma600,sigma250,sigmaFrm,gradient
  };
}

function renderSuperSpot(slotId,ss,exif){
  const el=document.getElementById('result'+slotId);if(!el)return;
  const baShift=(exif&&exif.make==='Canon')?(exif.wbShiftBA||0):0;
  const old=el.querySelector('.super-result');if(old)old.remove();
  const div=document.createElement('div');
  div.className='super-result';
  div.style.cssText='margin-top:6px;padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:10px';
  if(!ss||!ss.valid){
    div.innerHTML='<span style="color:var(--muted)">\u25ce Кадр: нейтральных зон недостаточно (найдено '+(ss?ss.count:0)+' px, нужно \u2265'+CONFIG.SUPER.MIN_PX+')</span>';
    el.appendChild(div);return;
  }
  const wb=applyBACorr(ss,baShift);
  const T=wb.T_base,g=wb.stepsGM_int;
  const gLbl=g>0?'M+'+g:g<0?'G+'+(-g):'M/G\u00a00';
  const gClr=g>0?'var(--magenta)':g<0?'var(--green)':'var(--muted)';
  const sigWarn=ss.sigma_T>CONFIG.SUPER.SIGMA_T_BAD?'\u26a0\u00a0несколько источников':ss.sigma_T>CONFIG.SUPER.SIGMA_T_WARN?'\u2139\u00a0смешанный свет':'';
  const sigClr=ss.sigma_T>CONFIG.SUPER.SIGMA_T_BAD?'var(--amber)':ss.sigma_T>CONFIG.SUPER.SIGMA_T_WARN?'var(--muted)':'var(--green)';
  div.innerHTML=
    '<span style="color:var(--muted)">\u25ce Кадр:\u00a0</span>'+

  const ref=hasGray?linTrim600:null,Tb=ref?ref.T_base:5500;
